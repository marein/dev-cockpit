name: release
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
      - name: Build & package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          version="${TAG#v}"
          go build -trimpath -ldflags="-s -w -X main.version=${version}" -o dev-cockpit ./cmd/dev-cockpit
          archive="dev-cockpit_${version}_${GOOS}_${GOARCH}.tar.gz"
          tar -czf "$archive" dev-cockpit LICENSE README.md
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          sha256sum * > "dev-cockpit_${TAG#v}_checksums.txt"
      - name: Upload to release
        run: gh release upload "$TAG" dist/* --clobber
